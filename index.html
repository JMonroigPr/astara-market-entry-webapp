<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astara Intelligence | Advisory</title>
  <style>
    :root {
      --bg: #071525;
      --bg-2: #0b1f36;
      --panel: rgba(17, 43, 70, 0.88);
      --line: rgba(140, 200, 255, 0.2);
      --text: #f3f7fb;
      --text-2: #c9d8e6;
      --accent: #8cc8ff;
      --accent-2: #5aa9e6;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.32);
      --radius: 28px;
      --max: 920px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 18%, rgba(140, 200, 255, 0.12), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 60%, var(--bg) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(var(--max), 100%);
      display: grid;
      gap: 20px;
    }

    .header {
      display: grid;
      gap: 10px;
      text-align: center;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.02;
      letter-spacing: -0.03em;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      padding: 28px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(17, 43, 70, 0.96), rgba(11, 31, 54, 0.96));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(140, 200, 255, 0.38);
    }

    .city {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.05;
    }

    .card p {
      margin: 0;
      color: var(--text-2);
      font-size: 15px;
      line-height: 1.5;
    }

    .cta {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(140, 200, 255, 0.12);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    @media (max-width: 720px) {
      .links {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div class="eyebrow">Astara Intelligence | Advisory</div>
      <h1>Selecciona un informe</h1>
    </header>

    <section class="links" aria-label="Informes disponibles">
      <a class="card" href="/lima">
        <h2 class="city">Lima</h2>
        <p>Informe de entrada de mercado en movilidad.</p>
        <span class="cta">Abrir informe</span>
      </a>

      <a class="card" href="/bogota">
        <h2 class="city">Bogotá</h2>
        <p>Informe de oportunidades de entrada en movilidad.</p>
        <span class="cta">Abrir informe</span>
      </a>
    </section>
  </main>
</body>
</html>
